use_default_settings: true

general:
  debug: false
  instance_name: "local-searxng"
  contact_url: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  # __SECRET_KEY__ 由 scripts/apps/searxng.sh 在部署时 openssl rand 替换
  secret_key: "__SECRET_KEY__"
  base_url: false
  limiter: false
  image_proxy: true
  method: "GET"

ui:
  static_use_hash: true

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  proxies:
    all://:
      - http://127.0.0.1:7890

# 多引擎兜底：Brave/Bing/mwmbl/wiby/Mojeek 抗压性强；
# Google/DDG/Startpage 容易 CAPTCHA 但留着，IP 轮换好时也能出结果。
engines:
  - name: bing
    disabled: false
  - name: mojeek
    disabled: false
  - name: qwant
    disabled: false
  - name: marginalia
    disabled: false
  - name: mwmbl
    disabled: false
  - name: wiby
    disabled: false
  - name: brave
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: google
    disabled: false
  - name: wikipedia
    disabled: false
  - name: wikidata
    disabled: false
