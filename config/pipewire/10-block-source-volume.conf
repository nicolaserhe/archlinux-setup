# PipeWire Pulse 规则：阻止 Chromium/Electron 应用在通话时覆盖源音量
# WebRTC AGC 会自动把麦克风增益拉到 100% 或乱调，block-source-volume quirk
# 让应用只能读音量但无权修改。
pulse.rules = [
    { matches = [ { application.process.binary = "wemeetapp" } ]  actions = { quirks = [ block-source-volume ] } }
    { matches = [ { application.process.binary = "feishu" } ]      actions = { quirks = [ block-source-volume ] } }
]
