# =============================================================================
# DMS environment variables
# → deployed to ~/.config/environment.d/90-dms.conf
#
# Loaded by systemd for all user sessions (log out/in to apply changes).
# See https://danklinux.com/docs/dankmaterialshell/advanced-configuration
# =============================================================================

# ── 终端模拟器 ────────────────────────────────────────────────────────────────
# DMS "System Updates" widget 需要此变量
TERMINAL=alacritty

# ── Qt / Wayland 主题 ─────────────────────────────────────────────────────────
QT_QPA_PLATFORM=wayland
QT_QPA_PLATFORMTHEME=gtk3
QT_QPA_PLATFORMTHEME_QT6=gtk3

# ── Electron 应用 Wayland 后端 ────────────────────────────────────────────────
ELECTRON_OZONE_PLATFORM_HINT=auto

# ── DMS 功能开关（按需取消注释）───────────────────────────────────────────────

# 禁用 matugen 动态取色（改用静态主题时启用）
# DMS_DISABLE_MATUGEN=1

# 禁用 cava 音频可视化
# DMS_DISABLE_CAVA=1

# 隐藏指定托盘图标（逗号分隔的应用 ID）
# DMS_HIDE_TRAYIDS=discord,spotify,steam

# 自定义 DankBar 图层（默认 top；如有图层叠加问题改为 overlay）
# DMS_DANKBAR_LAYER=overlay

# 自定义弹出面板图层
# DMS_POPOUT_LAYER=overlay
