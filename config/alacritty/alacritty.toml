# =============================================================================
# Alacritty 配置
# 文档：https://alacritty.org/config-alacritty.html
# =============================================================================

# DMS 动态主题（matugen 生成，首次 niri 登录后自动更新）
general.import = ["~/.config/alacritty/dank-theme.toml"]

# ── 字体 ─────────────────────────────────────────────────────────────────────
[font]
normal = { family = "maple-mono-nf-cn", style = "Regular" }
bold = { family = "maple-mono-nf-cn", style = "Bold" }
italic = { family = "maple-mono-nf-cn", style = "Italic" }
bold_italic = { family = "maple-mono-nf-cn", style = "Bold Italic" }

# ── 窗口 ─────────────────────────────────────────────────────────────────────
[window]
padding = { x = 8, y = 6 }
decorations = "None"
opacity = 0.95

# ── 滚动 ─────────────────────────────────────────────────────────────────────
[scrolling]
history = 10000

# ── 光标 ─────────────────────────────────────────────────────────────────────
[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
